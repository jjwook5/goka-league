<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>대회 관리자 (Admin)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; background: #0d1f15; color: #d4e4da; max-width: 480px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }
  .header { background: linear-gradient(135deg, #0d1f15 0%, #1a472a 100%); border-bottom: 1px solid #2d5a3d; padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 18px; font-weight: 900; color: #e8d5a3; letter-spacing: 1px; }
  .session-bar { background: #111f17; padding: 12px 16px; border-bottom: 2px solid #b87333; }
  .nav { display: flex; background: #111f17; border-bottom: 1px solid #1e3a2a; position: sticky; top: 0; z-index: 10; }
  .nav-btn { flex: 1; border: none; background: transparent; padding: 12px 4px; color: #6b8f77; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .nav-btn.active { color: #e8d5a3; border-bottom: 2px solid #e8d5a3; background: rgba(232,213,163,0.05); }
  .main { padding: 16px; }
  .hidden { display: none !important; }
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 11px; color: #8faa97; margin-bottom: 4px; font-weight: 600; }
  .form-input, .form-select { width: 100%; padding: 10px 12px; border-radius: 8px; background: #111f17; border: 1px solid #2d5a3d; color: #d4e4da; font-size: 14px; outline: none; }
  .btn-primary { width: 100%; padding: 14px; background: #1a472a; color: #e8d5a3; border: 1px solid #2d5a3d; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-primary:active { background: #0d1f15; }
  .roster-area { background: #111f17; border: 1px solid #2d5a3d; border-radius: 8px; padding: 10px; height: 130px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
  .player-chip { padding: 6px 10px; background: #1e3a2a; border: 1px solid #3a6b4a; border-radius: 16px; font-size: 12px; color: #d4e4da; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .group-box { background: #0d1f15; border: 1px solid #2d5a3d; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  .group-title { font-size: 13px; font-weight: 700; color: #e8d5a3; margin-bottom: 8px; }
  .slot-row { display: flex; justify-content: space-between; align-items: center; background: #111f17; padding: 8px 10px; border-radius: 6px; border: 1px dashed #2d5a3d; margin-bottom: 6px; min-height: 36px;}
  .team-toggle { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; }
  .team-white { background: #f8fafc; color: #0f172a; } .team-blue { background: #3b82f6; color: #ffffff; }
  .textarea-json { width: 100%; height: 120px; padding: 10px; border-radius: 8px; background: #111f17; border: 1px solid #2d5a3d; color: #8faa97; font-family: monospace; font-size: 11px; margin-bottom: 10px; resize: none; }
  .score-grid-wrapper { overflow-x: auto; margin-top: 10px; background: #0d1f15; border: 1px solid #2d5a3d; border-radius: 8px; padding: 8px; }
  .grid-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 12px; }
  .grid-table th { color: #8faa97; font-weight: 600; padding: 6px 4px; border-bottom: 1px solid #1e3a2a; font-size: 10px; }
  .grid-table td { padding: 8px 4px; border-bottom: 1px solid #152a1e; font-weight: 700; }
  .score-under { color: #3b82f6; } .score-par { color: #d4e4da; } .score-over { color: #ef4444; }
  #admin-loading { position: fixed; inset: 0; background: rgba(13,31,21,0.8); display: none; align-items: center; justify-content: center; z-index: 999; flex-direction: column; }
  .spinner { width: 40px; height: 40px; border: 3px solid #1e3a2a; border-top-color: #e8d5a3; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header class="header"><h1>⚙️ 대회 관리자 (Admin)</h1></header>

<div class="session-bar">
  <label class="form-label" style="color:#e8d5a3;">🔄 작업할 대회 선택</label>
  <select id="sessionMatchSelector" class="form-select" onchange="onSelectMatchSession(this.value)">
    <option value="NEW">+ 새 대회 생성하기</option>
  </select>
</div>

<nav class="nav">
  <button class="nav-btn active" id="btn-tab-phase1" onclick="switchTab('phase1')">1. 세팅&수정</button>
  <button class="nav-btn" id="btn-tab-phase2" onclick="switchTab('phase2')">2. 현장 매핑</button>
  <button class="nav-btn" id="btn-tab-phase3" onclick="switchTab('phase3')">3. 스코어 입력</button>
</nav>

<main class="main">
  <div id="tab-phase1">
    <div id="phase1-stepA">
      <div class="form-group"><label class="form-label">대회명</label><input type="text" id="matchName" class="form-input"></div>
      <div class="form-group"><label class="form-label">날짜 (YYYYMMDD 채번)</label><input type="date" id="matchDate" class="form-input"></div>
      <div class="form-group"><label class="form-label">구장명</label><select id="matchVenue" class="form-select"></select></div>
      <div class="form-group">
        <label class="form-label">총 참가 인원 (동적 생성)</label>
        <select id="playerCount" class="form-select">
          <option value="8">8명 (2팀)</option>
          <option value="12" selected>12명 (3팀)</option>
          <option value="16">16명 (4팀)</option>
          <option value="20">20명 (5팀)</option>
          <option value="24">24명 (6팀)</option>
          <option value="28">28명 (7팀)</option>
          <option value="32">32명 (8팀)</option>
          <option value="36">36명 (9팀)</option>
          <option value="40">40명 (10팀)</option>
        </select>
      </div>
      <button class="btn-primary" onclick="goToStepB()">다음: 조 편성하기 ➔</button>
    </div>
    <div id="phase1-stepB" class="hidden">
      <button class="btn-primary" style="background:transparent; border:none; color:#8faa97; font-size:12px; text-align:left; padding:0; margin-bottom:10px;" onclick="goToStepA()">← 기본 정보로 돌아가기</button>
      <label class="form-label">대기 명단 (터치하여 조에 추가)</label>
      <div class="roster-area" id="rosterList"></div>
      <label class="form-label">조 편성 현황</label>
      <div id="groupContainer"></div>
      <button class="btn-primary" id="btnSaveRoster" onclick="submitPhase1()">[1단계] 명단 확정 및 DB 적재</button>
    </div>
  </div>

  <div id="tab-phase2" class="hidden">
    <div class="form-group"><label class="form-label">선택된 구장</label><input type="text" id="selectedVenueText" class="form-input" disabled></div>
    <label class="form-label">조별 코스 매핑</label>
    <div id="mappingContainer"></div>
    <button class="btn-primary" onclick="submitPhase2()">[2단계] 코스 매핑 저장</button>
  </div>

  <div id="tab-phase3" class="hidden">
    <label class="form-label">AI 추출 스코어 (JSON 붙여넣기)</label>
    <textarea id="jsonInput" class="textarea-json"></textarea>
    <button class="btn-primary" style="background: #2d5a3d; margin-top: 0; margin-bottom: 16px;" onclick="previewScores()">데이터 검증 표 만들기</button>
    <div class="score-grid-wrapper hidden" id="previewArea">
      <table class="grid-table">
        <thead>
          <tr><th style="width:50px;text-align:left;">선수</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th><th>11</th><th>12</th><th>13</th><th>14</th><th>15</th><th>16</th><th>17</th><th>18</th></tr>
        </thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
    <div id="actionButtons" class="hidden" style="display:flex; flex-direction:column; gap:8px; margin-top:16px;">
      <div style="display:flex; gap:8px;">
        <button class="btn-primary" style="flex:1; background:#1e3a8a;" onclick="submitPhase3(false)">💾 부분 임시저장</button>
        <button class="btn-primary" style="flex:1; background:#b87333; color:#fff;" onclick="submitPhase3(true)">🚩 대회 최종 마감</button>
      </div>
      <button class="btn-primary" style="background:#7c3aed; color:#fff; margin-top:4px;" onclick="drawExcludeHoles()">🎲 제외홀 추첨 & 신페리오 정산</button>
    </div>
  </div>
</main>
<div id="admin-loading"><div class="spinner"></div><p style="color:#e8d5a3; margin-top:10px; font-size:12px;" id="loading-text">처리 중...</p></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz5ffx7QWXvwfe6hAZVyQFGPEC0B_97jpsqbyUiglmYGR1l_NnOAPtzu4b3iFY6I2D_/exec';

/* ═══ API 헬퍼 함수 ═══ */
function apiGet(action) {
  return fetch(API_URL + '?page=api&action=' + action)
    .then(res => res.json());
}

function apiPost(action, payload) {
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: action, payload: payload })
  }).then(res => res.json());
}

let globalData = { members: [], courses: [], records: [] };
let activeMatches = [];
let assignedGroups = {};
let currentMatchId = '';
let currentVenue = '';
let isEditMode = false;

function switchTab(tabId) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-tab-' + tabId).classList.add('active');
  ['phase1', 'phase2', 'phase3'].forEach(t => document.getElementById('tab-' + t).classList.toggle('hidden', t !== tabId));
  if(tabId === 'phase2') renderMappingUI();
}

function showLoading(msg) { document.getElementById('loading-text').innerText = msg; document.getElementById('admin-loading').style.display = 'flex'; }
function hideLoading() { document.getElementById('admin-loading').style.display = 'none'; }

window.onload = function() { loadAdminInitData(); };

/* ═══ 변환: loadAdminInitData ═══ */
function loadAdminInitData() {
  showLoading('데이터 동기화 중...');
  apiGet('getAllData').then(res => {
    globalData = res;
    const venueSelect = document.getElementById('matchVenue');
    venueSelect.innerHTML = '';
    [...new Set(res.courses.map(c => c['구장명']))].forEach(v => {
      const opt = document.createElement('option'); opt.value = v; opt.innerText = v; venueSelect.appendChild(opt);
    });
    
    return apiPost('apiGetActiveMatches', {});
  }).then(matches => {
    activeMatches = matches;
    const selector = document.getElementById('sessionMatchSelector');
    selector.innerHTML = '<option value="NEW">+ 새 대회 생성하기</option>';
    matches.forEach(m => {
      const opt = document.createElement('option'); opt.value = m.matchId; opt.innerText = `[진행중] ${m.matchName}`; selector.appendChild(opt);
    });
    hideLoading();
  }).catch(err => {
    hideLoading();
    alert('데이터 로딩 실패: ' + err.message);
  });
}

// ─── 대회 불러오기 시 조편성 복원 ───
function onSelectMatchSession(val) {
  if(val === 'NEW') {
    isEditMode = false; currentMatchId = ''; currentVenue = '';
    document.getElementById('matchName').value = ''; document.getElementById('matchDate').value = '';
    document.getElementById('btnSaveRoster').innerText = '[1단계] 명단 확정 및 DB 적재';
    goToStepA(); switchTab('phase1');
  } else {
    isEditMode = true;
    const matched = activeMatches.find(m => m.matchId === val);
    if(matched) {
      currentMatchId = matched.matchId; currentVenue = matched.venue;
      const matchRecords = globalData.records.filter(r => String(r['대회번호']) === currentMatchId);
      assignedGroups = {};
      const totalPlayers = matchRecords.length || 12;
      document.getElementById('playerCount').value = totalPlayers;
      for(let i=1; i<=(totalPlayers/4); i++) assignedGroups[i+'조'] = [];
      matchRecords.forEach(r => {
        const g = r['조번호'];
        if(!assignedGroups[g]) assignedGroups[g] = [];
        assignedGroups[g].push({ phone: r['전화번호'], name: r['성명'], nickname: r['닉네임'], league: r['소속리그'], group: g, team: r['소속팀'] });
      });
      document.getElementById('btnSaveRoster').innerText = '🔄 조편성 수정내역 덮어쓰기';
      alert('대회가 연결되었습니다.\n조편성(1단계)을 수정하거나, 현장매핑(2단계)으로 바로 넘어갈 수 있습니다.');
      goToStepB(); switchTab('phase1');
    }
  }
}

function goToStepB() {
  if(!isEditMode) {
    const pCount = parseInt(document.getElementById('playerCount').value);
    assignedGroups = {}; for(let i=1; i<=(pCount/4); i++) assignedGroups[i+'조'] = [];
    currentMatchId = document.getElementById('matchDate').value.replace(/-/g, '');
    currentVenue = document.getElementById('matchVenue').value;
  }
  document.getElementById('phase1-stepA').classList.add('hidden');
  document.getElementById('phase1-stepB').classList.remove('hidden');
  renderRoster(); renderGroupBoxes();
}

function goToStepA() { document.getElementById('phase1-stepB').classList.add('hidden'); document.getElementById('phase1-stepA').classList.remove('hidden'); }

function renderRoster() {
  const container = document.getElementById('rosterList'); container.innerHTML = '';
  const assignedPhones = Object.values(assignedGroups).flat().map(p => p.phone);
  globalData.members.forEach(m => {
    if(!assignedPhones.includes(m['전화번호'])) {
      const el = document.createElement('div'); el.className = 'player-chip';
      el.innerHTML = `<span>${m['성명']}</span> <span style="font-size:9px;color:#8faa97">${m['소속리그']}</span>`;
      el.onclick = () => assignPlayer(m); container.appendChild(el);
    }
  });
}

function renderGroupBoxes() {
  const container = document.getElementById('groupContainer'); container.innerHTML = '';
  Object.keys(assignedGroups).forEach(gName => {
    let html = `<div class="group-box"><div class="group-title">${gName}</div>`;
    const players = assignedGroups[gName];
    for(let i = 0; i < 4; i++) {
      if(players[i]) {
        const p = players[i]; const teamClass = p.team === '백팀' ? 'team-white' : 'team-blue';
        html += `<div class="slot-row"><div style="cursor:pointer; color:#e8d5a3" onclick="unassignPlayer('${gName}', '${p.phone}')">${p.name} ❌</div>
                 <button class="team-toggle ${teamClass}" onclick="toggleTeam('${gName}', '${p.phone}')">${p.team}</button></div>`;
      } else html += `<div class="slot-row"><span style="color:#5a7f6a;font-size:11px;">빈 자리</span></div>`;
    }
    html += `</div>`; container.innerHTML += html;
  });
}

function assignPlayer(m) {
  for(let g in assignedGroups) {
    if(assignedGroups[g].length < 4) { assignedGroups[g].push({ phone: m['전화번호'], name: m['성명'], nickname: m['닉네임'], league: m['소속리그'], group: g, team: '백팀' }); break; }
  }
  renderRoster(); renderGroupBoxes();
}
function unassignPlayer(g, phone) { assignedGroups[g] = assignedGroups[g].filter(p => p.phone !== phone); renderRoster(); renderGroupBoxes(); }
function toggleTeam(g, phone) { const p = assignedGroups[g].find(p => p.phone === phone); if(p) p.team = p.team === '백팀' ? '청팀' : '백팀'; renderGroupBoxes(); }

/* ═══ 변환: submitPhase1 ═══ */
function submitPhase1() {
  const allPlayers = Object.values(assignedGroups).flat();
  if(allPlayers.length === 0) return alert('조 편성을 진행해 주세요.');
  const payload = { matchId: currentMatchId, matchName: document.getElementById('matchName').value, date: document.getElementById('matchDate').value, venue: currentVenue, players: allPlayers };
  
  showLoading(isEditMode ? '조편성 수정사항 덮어쓰는 중...' : '새 대회 정보 등록 중...');
  const func = isEditMode ? 'apiUpdateMatchRoster' : 'apiCreateMatchAndPreInsert';
  
  apiPost(func, payload).then(res => {
    hideLoading();
    if(res.success) { alert(res.message); loadAdminInitData(); switchTab('phase2'); } else alert('오류: ' + res.error);
  }).catch(err => { hideLoading(); alert('서버 오류: ' + err.message); });
}

function renderMappingUI() {
  document.getElementById('selectedVenueText').value = currentVenue || '연결된 대회 없음';
  const venueCourses = globalData.courses.filter(c => c['구장명'] === currentVenue).map(c => c['코스명']);
  let options = venueCourses.map(c => `<option value="${c}">${c}</option>`).join('');
  let html = '';
  Object.keys(assignedGroups).forEach(g => {
    html += `<div class="group-box" style="display:flex; justify-content:space-between; align-items:center;">
               <span style="color:#e8d5a3; font-weight:700;">${g}</span>
               <select id="front_${g}" class="form-select" style="width:110px; padding:6px;">${options}</select> ➔
               <select id="back_${g}" class="form-select" style="width:110px; padding:6px;">${options}</select></div>`;
  });
  document.getElementById('mappingContainer').innerHTML = html;
}

/* ═══ 변환: submitPhase2 ═══ */
function submitPhase2() {
  const mappings = {};
  Object.keys(assignedGroups).forEach(g => mappings[g] = { front: document.getElementById('front_'+g).value, back: document.getElementById('back_'+g).value });
  showLoading('코스 매핑 저장 중...');
  apiPost('apiSetCourseMappingOnly', { matchId: currentMatchId, venue: currentVenue, mappings: mappings }).then(res => {
    hideLoading();
    if(res.success) { alert(res.message); switchTab('phase3'); } else alert('오류: ' + res.error);
  }).catch(err => { hideLoading(); alert('서버 오류: ' + err.message); });
}

function previewScores() {
  try {
    const data = JSON.parse(document.getElementById('jsonInput').value);
    const tbody = document.getElementById('previewBody'); tbody.innerHTML = '';
    data.forEach(p => {
      let rowHtml = `<tr><td style="text-align:left; color:#e8d5a3">${p.name}</td>`;
      p.scores.forEach(s => {
        let cls = 'score-par', text = '0'; if (s < 0) { cls = 'score-under'; text = s; } else if (s > 0) { cls = 'score-over'; text = '+' + s; }
        rowHtml += `<td class="${cls}">${text}</td>`;
      });
      rowHtml += `</tr>`; tbody.innerHTML += rowHtml;
    });
    document.getElementById('previewArea').classList.remove('hidden');
    document.getElementById('actionButtons').classList.remove('hidden');
    document.getElementById('actionButtons').style.display = 'flex';
  } catch(e) { alert('JSON 형식이 올바르지 않습니다.'); }
}

/* ═══ 변환: submitPhase3 ═══ */
function submitPhase3(isFinal) {
  if(!currentMatchId) return alert('상단에서 대회를 선택하세요.');
  const confirmMsg = isFinal ? "정말 대회를 최종 마감하시겠습니까? 마감 시 목록에서 사라집니다." : "점수를 임시 저장합니다. (정산은 추첨 시 실행됩니다)";
  if(!confirm(confirmMsg)) return;

  const payload = { matchId: currentMatchId, isFinal: isFinal, jsonScores: JSON.parse(document.getElementById('jsonInput').value) };
  showLoading('처리 중...');
  apiPost('apiSaveJsonScoresAndCalculate', payload).then(res => {
    hideLoading();
    if(res.success) {
      alert(res.message);
      document.getElementById('jsonInput').value = '';
      document.getElementById('previewArea').classList.add('hidden');
      if(isFinal) { 
        document.getElementById('actionButtons').classList.add('hidden');
        loadAdminInitData(); 
        switchTab('phase1'); 
      }
    } else alert('오류: ' + res.error);
  }).catch(err => { hideLoading(); alert('서버 오류: ' + err.message); });
}

/* ═══ 변환: drawExcludeHoles ═══ */
function drawExcludeHoles() {
  if(!currentMatchId) return alert('상단에서 대회를 선택하세요.');
  if(!confirm('제외홀을 무작위 추첨하고 신페리오 정산을 실행합니다.\n\n⚠️ 기존 추첨 결과가 있으면 덮어쓰기됩니다.\n계속하시겠습니까?')) return;
  
  showLoading('🎲 제외홀 추첨 및 정산 중...');
  apiPost('apiDrawExcludeHolesAndCalculate', { matchId: currentMatchId, venue: currentVenue }).then(res => {
    hideLoading();
    if(res.success) { alert(res.message); } else { alert('오류: ' + (res.error || JSON.stringify(res))); }
  }).catch(err => { hideLoading(); alert('서버 오류: ' + err.message); });
}
</script>
</body>
</html>
